name: Release

on:
  push:
    branches: [master]

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.rp.outputs.releases_created }}
      paths_released:   ${{ steps.rp.outputs.paths_released }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: rp
        with:
          token:         ${{ secrets.GITHUB_TOKEN }}
          config-file:   .github/config/release-please.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci --omit=optional

      - name: Build TypeScript packages
        run: npm run build

      - name: Publish released packages (TypeScript only — native packages published by build-native.yml)
        run: |
          NATIVE_PKGS="packages/virage-chunker-ce-md packages/virage-chunker-ce-docx packages/virage-chunker-ce-latex packages/virage-chunker-ce-pdf"
          echo '${{ needs.release-please.outputs.paths_released }}' \
            | jq -r '.[]' \
            | while read -r pkg; do
                if echo " $NATIVE_PKGS " | grep -qw "$pkg"; then
                  echo "Skipping $pkg — binaries must be built first; build-native.yml will publish it"
                else
                  npm publish --workspace "$pkg" --access public
                fi
              done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
