name: Release

on:
  push:
    branches: [main]

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.rp.outputs.releases_created }}
      paths_released:   ${{ steps.rp.outputs.paths_released }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: rp
        with:
          token:         ${{ secrets.GITHUB_TOKEN }}
          config-file:   .github/config/release-please.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci --omit=optional

      - name: Build TypeScript packages
        run: npm run build

      - name: Publish released packages
        run: |
          for pkg in ${{ needs.release-please.outputs.paths_released }}; do
            npm publish --workspace "$pkg" --access public
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
