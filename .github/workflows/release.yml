name: Release

on:
  push:
    branches: [master]

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.rp.outputs.releases_created }}
      paths_released:   ${{ steps.rp.outputs.paths_released }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: rp
        with:
          token:         ${{ secrets.GITHUB_TOKEN }}
          config-file:   .github/config/release-please.json
          manifest-file: .release-please-manifest.json

  setup:
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    outputs:
      packages:   ${{ steps.detect.outputs.packages }}
      has_native: ${{ steps.detect.outputs.has_native }}
    steps:
      - id: detect
        run: |
          NATIVE='packages/virage-chunker-ce-md packages/virage-chunker-ce-docx packages/virage-chunker-ce-latex packages/virage-chunker-ce-pdf'
          released='${{ needs.release-please.outputs.paths_released }}'
          found=false
          for n in $NATIVE; do
            if echo "$released" | jq -e --arg p "$n" '.[] | select(. == $p)' > /dev/null 2>&1; then
              found=true; break
            fi
          done
          if [ "$found" = "true" ]; then
            echo "has_native=true" >> "$GITHUB_OUTPUT"
            echo 'packages=["virage-chunker-ce-md","virage-chunker-ce-docx","virage-chunker-ce-latex","virage-chunker-ce-pdf"]' >> "$GITHUB_OUTPUT"
          else
            echo "has_native=false" >> "$GITHUB_OUTPUT"
            echo 'packages=[]'      >> "$GITHUB_OUTPUT"
          fi

  build:
    name: ${{ matrix.package }} / ${{ matrix.platform-name }}
    needs: [release-please, setup]
    if: |
      needs.release-please.outputs.releases_created == 'true' &&
      needs.setup.outputs.has_native == 'true'
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.setup.outputs.packages) }}
        platform-name:
          - linux-x64-gnu
          - linux-arm64-gnu
          - darwin-x64
          - darwin-arm64
          - win32-x64-msvc
        include:
          - { platform-name: linux-x64-gnu,   os: ubuntu-latest,  target: x86_64-unknown-linux-gnu }
          - { platform-name: linux-arm64-gnu, os: ubuntu-latest,  target: aarch64-unknown-linux-gnu, use-cross: true }
          - { platform-name: darwin-x64,      os: macos-latest,   target: x86_64-apple-darwin,      rust-flags: "-C link-arg=-undefined -C link-arg=dynamic_lookup" }
          - { platform-name: darwin-arm64,    os: macos-latest,   target: aarch64-apple-darwin,     rust-flags: "-C link-arg=-undefined -C link-arg=dynamic_lookup" }
          - { platform-name: win32-x64-msvc,  os: windows-latest, target: x86_64-pc-windows-msvc }

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Patch lockfile stub version fields
        run: node scripts/patch-lockfile-stubs.cjs

      - run: npm ci --omit=optional

      - name: Install cross-compilation toolchain (ARM64 Linux)
        if: matrix.use-cross == true
        run: sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build (cross — ARM64 Linux)
        if: matrix.use-cross == true
        run: |
          cd packages/${{ matrix.package }}
          npx napi build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Build (native)
        if: matrix.use-cross != true
        run: |
          cd packages/${{ matrix.package }}
          npx napi build --release --target ${{ matrix.target }}
        env:
          RUSTFLAGS: ${{ matrix.rust-flags }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package }}-${{ matrix.platform-name }}
          path: packages/${{ matrix.package }}/*.node
          if-no-files-found: error

  publish:
    needs: [release-please, setup, build]
    if: |
      always() &&
      needs.release-please.outputs.releases_created == 'true' &&
      needs.build.result != 'failure' &&
      needs.setup.result != 'failure'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Patch lockfile stub version fields
        run: node scripts/patch-lockfile-stubs.cjs

      - run: npm ci --omit=optional

      - name: Download binary artifacts
        if: needs.setup.outputs.has_native == 'true'
        uses: actions/download-artifact@v8
        with:
          path: binaries/

      - name: Verify + place binaries into npm/ dirs
        if: needs.setup.outputs.has_native == 'true'
        run: |
          set -e
          for pkg in $(echo '${{ needs.setup.outputs.packages }}' | jq -r '.[]'); do
            lib_name=$(echo "$pkg" | tr '-' '_')
            for platform in linux-x64-gnu linux-arm64-gnu darwin-x64 darwin-arm64 win32-x64-msvc; do
              artifact_dir="binaries/${pkg}-${platform}"
              node_file=$(ls "$artifact_dir"/*.node 2>/dev/null | head -1)
              if [ -z "$node_file" ]; then
                echo "ERROR: missing .node for $pkg / $platform"
                exit 1
              fi
              cp "$node_file" "packages/$pkg/npm/$platform/${lib_name}.node"
            done
          done

      - name: Build TypeScript workspace dependencies
        run: npm run build -w @vivantel/virage-chunker-ce-ast

      - name: Build TypeScript for native packages
        if: needs.setup.outputs.has_native == 'true'
        run: |
          for pkg in $(echo '${{ needs.setup.outputs.packages }}' | jq -r '.[]'); do
            npm run build --workspace "packages/$pkg"
          done

      - name: Publish TS packages
        run: |
          NATIVE_PKGS="packages/virage-chunker-ce-md packages/virage-chunker-ce-docx packages/virage-chunker-ce-latex packages/virage-chunker-ce-pdf"
          echo '${{ needs.release-please.outputs.paths_released }}' \
            | jq -r '.[]' \
            | while read -r pkg; do
                if echo " $NATIVE_PKGS " | grep -qw "$pkg"; then
                  echo "Skipping $pkg — native, publishing below"
                else
                  npm publish --workspace "$pkg" --access public
                fi
              done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish platform stubs and native packages
        if: needs.setup.outputs.has_native == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for pkg in $(echo '${{ needs.setup.outputs.packages }}' | jq -r '.[]'); do
            pkg_name=$(node -p "require('./packages/${pkg}/package.json').name")
            version=$(node -p "require('./packages/${pkg}/package.json').version")

            for platform in linux-x64-gnu linux-arm64-gnu darwin-x64 darwin-arm64 win32-x64-msvc; do
              stub_name="${pkg_name}-${platform}"
              if npm view "${stub_name}@${version}" version 2>/dev/null | grep -qF "${version}"; then
                echo "ℹ️  ${stub_name}@${version} already on npm — skipping"
              else
                npm publish "packages/${pkg}/npm/${platform}/" --access public
              fi
            done

            if npm view "${pkg_name}@${version}" version 2>/dev/null | grep -qF "${version}"; then
              echo "ℹ️  ${pkg_name}@${version} already on npm — skipping"
            else
              npm publish --workspace "packages/${pkg}" --access public
            fi
          done
