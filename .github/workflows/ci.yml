name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to build — leave blank to build all native packages'
        required: false
        default: ''

jobs:
  ci:
    name: CI (${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [22, 24]

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        if: matrix.node == 22
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        if: matrix.node == 22
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Patch lockfile stub version fields
        run: node scripts/patch-lockfile-stubs.cjs

      - name: Install npm dependencies
        run: npm ci

      - name: Rust formatting
        if: matrix.node == 22
        run: cargo fmt --check

      - name: Rust linting
        if: matrix.node == 22
        run: cargo clippy -- -D warnings

      - name: Build native (linux-x64 validation)
        if: matrix.node == 22
        run: cargo build --release

      - name: Build TypeScript workspace dependencies
        run: npm run build -w @vivantel/virage-chunker-ce-ast

      - name: TypeScript type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test

  setup:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.resolve.outputs.packages }}
    steps:
      - id: resolve
        run: |
          if [ -n "${{ inputs.package }}" ]; then
            echo 'packages=["${{ inputs.package }}"]' >> "$GITHUB_OUTPUT"
          else
            echo 'packages=["virage-chunker-ce-md","virage-chunker-ce-docx","virage-chunker-ce-latex","virage-chunker-ce-pdf"]' >> "$GITHUB_OUTPUT"
          fi

  build:
    name: ${{ matrix.package }} / ${{ matrix.platform-name }}
    needs: setup
    if: |
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.setup.outputs.packages) }}
        platform-name:
          - linux-x64-gnu
          - linux-arm64-gnu
          - darwin-x64
          - darwin-arm64
          - win32-x64-msvc
        include:
          - { platform-name: linux-x64-gnu,   os: ubuntu-latest,  target: x86_64-unknown-linux-gnu }
          - { platform-name: linux-arm64-gnu, os: ubuntu-latest,  target: aarch64-unknown-linux-gnu, use-cross: true }
          - { platform-name: darwin-x64,      os: macos-latest,   target: x86_64-apple-darwin,      rust-flags: "-C link-arg=-undefined -C link-arg=dynamic_lookup" }
          - { platform-name: darwin-arm64,    os: macos-latest,   target: aarch64-apple-darwin,     rust-flags: "-C link-arg=-undefined -C link-arg=dynamic_lookup" }
          - { platform-name: win32-x64-msvc,  os: windows-latest, target: x86_64-pc-windows-msvc }

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Patch lockfile stub version fields
        run: node scripts/patch-lockfile-stubs.cjs

      - run: npm ci --omit=optional

      - name: Install cross-compilation toolchain (ARM64 Linux)
        if: matrix.use-cross == true
        run: sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build (cross — ARM64 Linux)
        if: matrix.use-cross == true
        run: |
          cd packages/${{ matrix.package }}
          npx napi build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Build (native)
        if: matrix.use-cross != true
        run: |
          cd packages/${{ matrix.package }}
          npx napi build --release --target ${{ matrix.target }}
        env:
          RUSTFLAGS: ${{ matrix.rust-flags }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package }}-${{ matrix.platform-name }}
          path: packages/${{ matrix.package }}/*.node
          if-no-files-found: error
