[package]
name    = "virage-chunker-ce-md"
version = "0.1.0"
edition = "2021"
description = "Markdown / MDX chunker for Virage — Rust napi-rs native addon (comrak)"
license = "MIT OR Apache-2.0"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi         = { workspace = true }
napi-derive  = { workspace = true }
serde_json   = { workspace = true }
virage-vidoc = { workspace = true }
comrak       = "0.52"

[build-dependencies]
napi-build = "2"
