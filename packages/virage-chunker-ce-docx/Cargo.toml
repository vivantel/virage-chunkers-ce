[package]
name    = "virage-chunker-ce-docx"
version = "0.1.0"
edition = "2021"
description = "DOCX chunker for Virage — Rust napi-rs native addon (docx-rs)"
license = "MIT OR Apache-2.0"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi         = { workspace = true }
napi-derive  = { workspace = true }
serde_json   = { workspace = true }
virage-vidoc = { workspace = true }
docx-rs      = { version = "0.4", default-features = false }

[build-dependencies]
napi-build = "2"
